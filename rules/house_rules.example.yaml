# =============================================================================
# House Rules — TEMPLATE / EXAMPLE
#
# This file shows the schema the firm's actual margin rules should use. It is
# NOT loaded by the engine. Copy it to `house_rules.yaml` and replace the
# example rules with the firm's real ones.
#
# Why a separate file from cboe_baseline.yaml:
#   - CBOE rules are the regulatory floor (free, public, in Margin_Manual.pdf).
#   - The firm's actual rules are stricter and live inside the current vendor
#     (Sterling, etc.) — undocumented externally.
#   - Reconciling vendor output against cboe_baseline.yaml surfaces every
#     divergence; each divergence is a house rule. Move them into this file
#     as they become known.
#
# Engine selection (future): the Rulebook loader will accept multiple files
# in priority order — house rules win, CBOE fills the gap. For now, the
# loader takes one file; point it at house_rules.yaml when ready to switch.
# =============================================================================
schema_version: "3.0"

source:
  document: "<firm's internal margin policy document or vendor config>"
  publisher: "<firm name>"
  version_date: "<YYYY-MM-DD>"

# Rate tables can override the CBOE defaults. Any class omitted here falls
# back to cboe_baseline.yaml when multi-file loading is wired up.
rates:
  # Example: firm charges 25% base on equity (vs CBOE's 20%).
  # equity: { base_pct: 0.25, min_pct: 0.10 }

constants:
  # Firm-specific thresholds go here. Example:
  # pdt_min_equity_usd: 25000
  # pm_eligibility_min_equity_usd: 150000

# Rules in declaration order; first match wins.
rules:
  # ---------------------------------------------------------------------------
  # Example: firm's short-call rule charges 30% instead of CBOE's 20%.
  # Replace this whole block with real rules from the PM.
  # ---------------------------------------------------------------------------
  # - id: house_short_call_uncovered
  #   match:
  #     legs:
  #       - { name: opt, side: short, kind: option, option_type: call }
  #   formulas:
  #     margin:
  #       initial: |
  #         legs.opt.qty * legs.opt.mult * (
  #           legs.opt.P0
  #           + max(
  #               0.30 * lev * U - max(0.0, legs.opt.K - U),
  #               0.15 * lev * U
  #             )
  #         )
  #       maintenance: |
  #         legs.opt.qty * legs.opt.mult * (
  #           legs.opt.P
  #           + max(
  #               0.30 * lev * U - max(0.0, legs.opt.K - U),
  #               0.15 * lev * U
  #             )
  #         )
  #       initial_proceeds:     "legs.opt.P0 * legs.opt.qty * legs.opt.mult"
  #       maintenance_proceeds: "legs.opt.P  * legs.opt.qty * legs.opt.mult"
